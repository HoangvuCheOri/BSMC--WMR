ekf_filter_node:
  ros__parameters:
    frequency: 15.0           # THAY: Giảm từ 20Hz xuống 15Hz để mượt mà trên máy ảo CPU yếu
    sensor_timeout: 0.5       # THAY: 500ms, chịu được vài gói WiFi drop
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.1    # THÊM: tránh lỗi TF khi hệ thống bận
    print_diagnostics: true
    debug: false

    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /odom_raw
    odom0_config: [false, false, false,    # Tắt X, Y tuyệt đối từ odom_raw để tránh xung đột tích phân
                   false, false, false,
                   true,  false, false,    # CHỈ fuse Vx (vận tốc dài)
                   false, false, false,    # Tắt Wz từ encoder (đã lấy từ IMU siêu sạch)
                   false, false, false]

    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 1.0

    # Cấu hình Camera (VÔ HIỆU HÓA KHI CHẠY THỬ KHÔNG CAMERA)
    # odom1: /odom_camera
    # odom1_config: [true,  true,  false,
    #                false, false, true,
    #                false, false, false,
    #                false, false, false,
    #                false, false, false]

    # odom1_queue_size: 10
    # odom1_differential: false
    # odom1_relative: false
    # odom1_pose_rejection_threshold: 2.0

    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]

    imu0_queue_size: 10
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 1.0
    imu0_linear_acceleration_rejection_threshold: 1.0

    use_control: false